<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E34234" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E34234" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <ellipse cx="600" cy="315" rx="320" ry="280" fill="url(#glow)"/>

  <!-- Exact same logo from favicon, centered and scaled 4x -->
  <g transform="translate(500, 112) scale(4)">
    <path d="M 0 60 L 0 15 L 15 0 L 35 0 L 50 15 L 50 60 L 35 60 L 35 25 L 15 25 L 15 60 Z" fill="#FFFFFF"/>
    <rect x="20" y="35" width="10" height="25" fill="#E34234"/>
  </g>

  <!-- "Mushin" text — visual top at 372 (20px below logo bottom 352) -->
  <text x="600" y="409" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">Mushin</text>

  <!-- "Track. Share. Connect." — visual top at 433 (20px below Mushin visual bottom 413) -->
  <text x="600" y="449" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#E34234" text-anchor="middle" letter-spacing="4">Track. Share. Connect.</text>

  <!-- "無心" — visual top at 471 (20px below Track visual bottom 451) -->
  <text x="600" y="499" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="8">無 心</text>

  <!-- Subtle bottom line — 20px below 無心 visual bottom (499) -->
  <line x1="420" y1="519" x2="780" y2="519" stroke="#E34234" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
